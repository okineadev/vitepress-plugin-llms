name: Tests

on:
  workflow_call:
    inputs:
      run-on-windows:
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Tests
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-slim
          - ${{ inputs.run-on-windows && 'windows-latest' || '' }}
        exclude:
          - os: ''

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout-cone-mode: false
          # Download only the necessary files
          sparse-checkout: |
            patches/
            src/
            tests/
            .gitignore
            bunup.config.ts
            package.json
            biome.jsonc
            bun.lock
            bunfig.toml
            cspell.yml
            tsconfig*.json
            !**/*.md
            tests/test-assets/*.md

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      # Run only on Windows because on Linux there are no problems with slow package installation
      - name: 📥 Cache Bun dependencies (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~\.bun
          key: ${{ matrix.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ matrix.os }}-bun-cache-

      - name: 📦 Install dependencies
        run: bun ci --prefer-offline --ignore-scripts

      - name: 🗞️ Lint
        run: bun run lint

      - name: 🗞️ Run Woke linter
        uses: get-woke/woke-action@b2ec032c4a2c912142b38a6a453ad62017813ed0 # v0
        with:
          # Cause the check to fail on any broke rules
          fail-on-error: true

      - name: 🧪 Run tests
        run: bun run test
