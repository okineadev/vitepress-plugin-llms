name: рҹ‘·вҖҚвҷӮпёҸ Update Dependents Info

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  dependents:
    name: рҹ‘·вҖҚвҷӮпёҸ Update dependents.info
    runs-on: ubuntu-slim
    permissions:
      id-token: write # Needed for https://dependents.info
    steps:
      - uses: gouravkhunger/dependents.info@bb3d55b67e0ec762dacb8c7456585a8464e14cb4 # v0.1.5
        with:
          exclude-users: koel
